name: Build SEA Binaries

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target.id }}
    runs-on: ${{ matrix.target.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: win-x64
            runs_on: windows-latest
            output_file: voyager-summarizer-win-x64.exe
          - id: linux-x64
            runs_on: ubuntu-latest
            output_file: voyager-summarizer-linux-x64
          - id: macos-x64
            runs_on: macos-13
            output_file: voyager-summarizer-macos-x64
          - id: macos-arm64
            runs_on: macos-14
            output_file: voyager-summarizer-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dxworks'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build SEA binary
        run: npm run build:sea

      - name: Verify binary exists
        shell: bash
        run: |
          test -f "dist/sea/${{ matrix.target.output_file }}"

      - name: Upload SEA binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: voyager-summarizer-${{ matrix.target.id }}
          path: dist/sea/${{ matrix.target.output_file }}
